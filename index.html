<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grit Quest - SNES Style</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
<style>
body {margin:0; background:black; touch-action:none;}
canvas {display:block; margin:auto;}
button {position:absolute; font-size:24px; opacity:0.5;}
#up {top:70%; left:45%;}
#down {top:85%; left:45%;}
#left {top:77%; left:35%;}
#right {top:77%; left:55%;}
#shoot {top:77%; right:10%;}
</style>
</head>
<body>
<!-- Mobile Buttons -->
<button id="up">↑</button><button id="down">↓</button>
<button id="left">←</button><button id="right">→</button><button id="shoot">⚡</button>

<script>
/* ================= AUDIO ================= */
let audioCtx;
function initAudio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }
function beep(freq,dur,type="square",vol=0.1){
  if(!audioCtx) return;
  let osc=audioCtx.createOscillator(),g=audioCtx.createGain();
  osc.type=type; osc.frequency.value=freq; g.gain.value=vol;
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime+dur);
}

/* ================= PIXEL ART GENERATOR ================= */
const palette = { ".":null, R:"#ff0000", B:"#0000ff", H:"#ffff00", G:"#00aa00", W:"#ffffff", L:"#888888", Y:"#ffcc00", P:"#cc00cc" };

function drawPixelArt(scene,key,art,pixelSize=3){
  const w=art[0].length*pixelSize, h=art.length*pixelSize;
  const rt=scene.make.renderTexture({width:w,height:h,add:false});
  art.forEach((row,y)=>row.split("").forEach((c,x)=>{
    const col=palette[c];
    if(col) rt.fill(col,1,x*pixelSize,y*pixelSize,pixelSize,pixelSize);
  }));
  rt.saveTexture(key);
}

/* ================= TITLE SCENE ================= */
class TitleScene extends Phaser.Scene{
  constructor(){ super("TitleScene"); }
  create(){
    this.add.rectangle(400,300,800,600,0x2222aa);
    this.add.text(180,150,"GRIT QUEST",{fontSize:"64px",fill:"#ffffff"});
    this.add.text(220,250,"Press SPACE / Tap ⚡ to Start",{fontSize:"28px",fill:"#ffff00"});

    // Draw player and zombie for title
    drawPixelArt(this,"player_title",[
      "..R..",
      ".RRR.",
      "RRRRR",
      ".R.R.",
      "R...R"
    ],10);
    drawPixelArt(this,"zombie_title",[
      "..G..",
      ".GGG.",
      "GGGGG",
      ".G.G.",
      "G...G"
    ],10);

    this.add.image(300,400,"player_title").setScale(3);
    this.add.image(500,400,"zombie_title").setScale(3);

    const start=()=>{
      initAudio();
      this.scene.start("GameScene");
    };
    this.input.keyboard.once('keydown-SPACE',start);
    document.getElementById('shoot').addEventListener('touchstart',start,{once:true});
  }
}

/* ================= GAME SCENE ================= */
class GameScene extends Phaser.Scene{
  constructor(){ super("GameScene"); }
  create(){
    const scene=this;

    /* ================= TILEMAP ================= */
    this.tiles=[];
    for(let y=0;y<600;y+=32) for(let x=0;x<800;x+=32){
      const t=this.add.rectangle(x+16,y+16,32,32,0xdddddd);
      this.tiles.push(t);
    }
    this.obstacles=this.physics.add.staticGroup();
    for(let i=0;i<12;i++){
      this.obstacles.create(Phaser.Math.Between(50,750),Phaser.Math.Between(50,550),null).setSize(32,32).setVisible(false);
    }

    /* ================= PLAYER ================= */
    drawPixelArt(scene,"player_down",[
      "..R..",
      ".RRR.",
      "RRRRR",
      ".R.R.",
      "R...R"
    ],6);
    this.player=this.physics.add.sprite(400,300,'player_down');
    this.player.setCollideWorldBounds(true);
    this.lastDir="down"; this.inDetention=false;

    /* ================= ZOMBIES ================= */
    drawPixelArt(scene,"zombie",[  
      "..G..",
      ".GGG.",
      "GGGGG",
      ".G.G.",
      "G...G"
    ],6);
    this.zombies=this.physics.add.group();
    for(let i=0;i<3;i++){
      const z=this.zombies.create(Phaser.Math.Between(50,750),Phaser.Math.Between(50,550),"zombie");
      z.speed=40;
    }

    /* ================= GRIT ================= */
    drawPixelArt(scene,"grit",[
      ".Y.",
      "YYY",
      ".Y."
    ],6);
    this.grit=this.physics.add.sprite(Phaser.Math.Between(50,750),Phaser.Math.Between(50,550),"grit");

    /* ================= STATS ================= */
    this.score=0; this.health=3;
    this.scoreText=this.add.text(20,20,"Score:0",{fontSize:"20px",fill:"#fff"});
    this.healthText=this.add.text(20,50,"Health:3",{fontSize:"20px",fill:"#ff4444"});

    /* ================= COLLISIONS ================= */
    this.physics.add.overlap(this.player,this.grit,()=>{
      if(!this.inDetention){
        beep(880,0.1);
        this.score+=10;
        this.scoreText.setText("Score:"+this.score);
        this.grit.setPosition(Phaser.Math.Between(50,750),Phaser.Math.Between(50,550));
      }
    });
    this.physics.add.overlap(this.player,this.zombies,()=>{if(!this.inDetention)this.sendToDetention();});
    this.physics.add.collider(this.player,this.obstacles);
    this.physics.add.collider(this.zombies,this.obstacles);

    /* ================= CONTROLS ================= */
    this.cursors=this.input.keyboard.createCursorKeys();
    this.wasd=this.input.keyboard.addKeys({w:'W',a:'A',s:'S',d:'D'});
    const dirButtons={up:()=>this.movePlayer(0,-1),down:()=>this.movePlayer(0,1),left:()=>this.movePlayer(-1,0),right:()=>this.movePlayer(1,0)};
    ['up','down','left','right'].forEach(id=>document.getElementById(id).addEventListener('touchstart',()=>dirButtons[id]()));
    document.getElementById('shoot').addEventListener('touchstart',()=>beep(440,0.05));
  }

  movePlayer(x,y){ if(this.inDetention)return; this.player.setVelocity(x*150,y*150); }

  sendToDetention(){
    this.inDetention=true;
    this.player.setVisible(false);
    this.player.setVelocity(0,0);
    this.health--;
    this.healthText.setText("Health:"+this.health);
    const text=this.add.text(300,300,"DETENTION!",{fontSize:"32px",fill:"#ff0000"});
    if(this.health<=0){this.scene.start("GameOverScene",{score:this.score});return;}
    this.time.delayedCall(60000,()=>{
      this.inDetention=false;
      this.player.setVisible(true);
      this.player.setPosition(400,300);
      text.destroy();
    },[],this);
  }

  update(){
    if(!this.inDetention){
      let vx=0,vy=0;
      if(this.cursors.left.isDown||this.wasd.a.isDown) vx=-150;
      if(this.cursors.right.isDown||this.wasd.d.isDown) vx=150;
      if(this.cursors.up.isDown||this.wasd.w.isDown) vy=-150;
      if(this.cursors.down.isDown||this.wasd.s.isDown) vy=150;
      this.player.setVelocity(vx,vy);
    }
    this.zombies.children.iterate(z=>{
      this.physics.moveToObject(z,this.player,z.speed);
    });
  }
}

/* ================= GAME OVER ================= */
class GameOverScene extends Phaser.Scene{
  constructor(){ super("GameOverScene"); }
  create(data){
    this.add.rectangle(400,300,800,600,0x220000);
    this.add.text(250,200,"GAME OVER",{fontSize:"64px",fill:"#ff0000"});
    this.add.text(290,300,"Final Score:"+data.score,{fontSize:"28px",fill:"#fff"});
    this.add.text(240,380,"Press SPACE / Tap ⚡ to Restart",{fontSize:"28px",fill:"#ffff00"});
    this.input.keyboard.once('keydown-SPACE',()=>this.scene.start("TitleScene"));
    document.getElementById('shoot').addEventListener('touchstart',()=>this.scene.start("TitleScene"),{once:true});
  }
}

/* ================= CONFIG ================= */
const config={type:Phaser.AUTO,width:800,height:600,pixelArt:true,physics:{default:'arcade'},scene:[TitleScene,GameScene,GameOverScene]};
new Phaser.Game(config);
</script>
</body>
</html>
