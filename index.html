<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grit Quest NES Animated</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
<style>
body { margin:0; background:black; touch-action:none; }
canvas { display:block; margin:auto; }
button { position:absolute; opacity:0.5; font-size:24px; }
#up { top:70%; left:45%; }
#down { top:85%; left:45%; }
#left { top:77%; left:35%; }
#right { top:77%; left:55%; }
#shoot { top:77%; right:10%; }
</style>
</head>
<body>

<!-- Mobile buttons -->
<button id="up">↑</button>
<button id="down">↓</button>
<button id="left">←</button>
<button id="right">→</button>
<button id="shoot">⚡</button>

<script>
/* =============================
   AUDIO ENGINE
============================= */
let audioCtx;
let musicTimer;
let musicStep = 0;
const musicNotes = [220,262,330,392];

function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(freq,dur,type="square",vol=0.1){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.value = vol;
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime+dur);
}

function startMusic(scene){
  if(musicTimer) return;
  musicTimer = scene.time.addEvent({
    delay:300,
    loop:true,
    callback:()=>{beep(musicNotes[musicStep%musicNotes.length],0.15,"square",0.05);musicStep++;}
  });
}
function stopMusic(){if(musicTimer){musicTimer.remove();musicTimer=null;}}

/* =============================
   TITLE SCENE
============================= */
class TitleScene extends Phaser.Scene{
  constructor(){super("TitleScene");}
  create(){
    this.add.rectangle(400,300,800,600,0x000022);
    this.add.text(200,180,"GRIT QUEST",{fontSize:"64px",fill:"#ffffff"});
    this.add.text(240,300,"Press SPACE / Tap ⚡ to Start",{fontSize:"28px",fill:"#ffff00"});

    const startGame = ()=>{
      initAudio();
      startMusic(this);
      this.scene.start("GameScene");
    };
    this.input.keyboard.once('keydown-SPACE',startGame);
    document.getElementById('shoot').addEventListener('touchstart',startGame,{once:true});
  }
}

/* =============================
   GAME SCENE
============================= */
class GameScene extends Phaser.Scene{
  constructor(){super("GameScene");}
  preload(){
    let g = this.make.graphics({x:0,y:0,add:false});
    // --- Player animations 2 frames per direction ---
    const colors = {player:0x3399ff,zombie:0x88ff88,grit:0xffcc00,bullet:0xff4444};
    const size = {player:16,zombie:16,grit:16,bullet:6};
    const directions = ['up','down','left','right'];

    // Create player frames
    directions.forEach(dir=>{
      for(let i=0;i<2;i++){
        g.clear();
        g.fillStyle(colors.player);
        // Slight variation for animation
        g.fillRect(0,0,size.player,size.player);
        g.fillStyle(0x000000);
        g.fillRect(i*2,4,4,8); // simple NES-style detail
        g.generateTexture('player_'+dir+'_'+i,size.player,size.player);
      }
    });

    // Zombie frames 2 frames
    for(let i=0;i<2;i++){
      g.clear();
      g.fillStyle(colors.zombie);
      g.fillRect(0,0,size.zombie,size.zombie);
      g.fillStyle(0x006600);
      g.fillRect(i*2,4,4,8);
      g.generateTexture('zombie_'+i,size.zombie,size.zombie);
    }

    // Grit frames 2 frames
    for(let i=0;i<2;i++){
      g.clear();
      g.fillStyle(colors.grit);
      g.fillCircle(size.grit/2,size.grit/2,size.grit/2 - i);
      g.generateTexture('grit_'+i,size.grit,size.grit);
    }

    // Bullet frames 2 frames
    for(let i=0;i<2;i++){
      g.clear();
      g.fillStyle(colors.bullet);
      g.fillRect(0,0,size.bullet,size.bullet);
      g.generateTexture('bullet_'+i,size.bullet,size.bullet);
    }

    // Tilemap and obstacles
    g.clear();
    g.fillStyle(0x2d8f2d);
    g.fillRect(0,0,32,32);
    g.generateTexture('grass',32,32);
    g.clear();
    g.fillStyle(0x555555);
    g.fillRect(0,0,32,32);
    g.generateTexture('rock',32,32);
    g.destroy();
  }

  create(){
    // Tilemap background
    this.tiles=[];
    for(let y=0;y<600;y+=32){
      for(let x=0;x<800;x+=32){
        let tile=this.add.image(x+16,y+16,'grass');
        this.tiles.push(tile);
      }
    }
    this.obstacles=this.physics.add.staticGroup();
    for(let i=0;i<20;i++){
      let ox=Phaser.Math.Between(50,750);
      let oy=Phaser.Math.Between(50,550);
      this.obstacles.create(ox,oy,'rock');
    }

    this.physics.world.setBounds(0,0,800,600);
    this.score=0; this.health=3; this.wave=1;
    this.highScore = localStorage.getItem('gritHighScore')||0;
    this.scoreText=this.add.text(20,20,"Score:0",{fontSize:"20px",fill:"#fff"});
    this.healthText=this.add.text(20,50,"Health:3",{fontSize:"20px",fill:"#ff4444"});
    this.waveText=this.add.text(20,80,"Wave:1",{fontSize:"20px",fill:"#ffff00"});
    this.highScoreText=this.add.text(600,20,"High:"+this.highScore,{fontSize:"20px",fill:"#00ffff"});

    // Player
    this.player=this.physics.add.sprite(400,300,'player_down_0');
    this.player.setCollideWorldBounds(true);
    this.lastDir='down';
    this.playerFrame=0;
    this.frameTimer=0;

    // Bullets
    this.bullets=this.physics.add.group();

    // Zombies
    this.zombies=this.physics.add.group();
    this.spawnZombies(3);

    // Grit
    this.grit=this.physics.add.sprite(Phaser.Math.Between(50,750),Phaser.Math.Between(50,550),'grit_0');
    this.gritFrame=0;

    // Colliders
    this.physics.add.overlap(this.player,this.grit,()=>{
      beep(880,0.1);
      this.score+=10;
      this.scoreText.setText("Score:"+this.score);
      this.grit.setPosition(Phaser.Math.Between(50,750),Phaser.Math.Between(50,550));
    });
    this.physics.add.overlap(this.player,this.zombies,(p,z)=>{
      beep(110,0.2,"sawtooth",0.15);
      this.health--; this.healthText.setText("Health:"+this.health);
      this.player.setPosition(400,300);
      if(this.health<=0){
        stopMusic();
        if(this.score>this.highScore) localStorage.setItem('gritHighScore',this.score);
        this.scene.start("GameOverScene",{score:this.score});
      }
    });
    this.physics.add.overlap(this.bullets,this.zombies,(b,z)=>{
      beep(660,0.05);
      b.destroy(); z.destroy();
      this.score+=5;
      this.scoreText.setText("Score:"+this.score);
      if(this.zombies.countActive(true)===0){
        this.wave++;
        this.waveText.setText("Wave:"+this.wave);
        this.spawnZombies(2+this.wave);
      }
    });
    this.physics.add.collider(this.player,this.obstacles);
    this.physics.add.collider(this.zombies,this.obstacles);

    // Controls
    this.cursors=this.input.keyboard.createCursorKeys();
    this.wasd=this.input.keyboard.addKeys({w:'W',a:'A',s:'S',d:'D'});

    // Mobile buttons
    const dirButtons={
      up:()=>{this.lastDir='up'; this.movePlayer(0,-1);},
      down:()=>{this.lastDir='down'; this.movePlayer(0,1);},
      left:()=>{this.lastDir='left'; this.movePlayer(-1,0);},
      right:()=>{this.lastDir='right'; this.movePlayer(1,0);}
    };
    ['up','down','left','right'].forEach(id=>{
      document.getElementById(id).addEventListener('touchstart',()=>dirButtons[id]());
    });
    document.getElementById('shoot').addEventListener('touchstart',()=>this.shoot());
  }

  spawnZombies(count){
    for(let i=0;i<count;i++){
      let z=this.zombies.create(Phaser.Math.Between(50,750),Phaser.Math.Between(50,550),'zombie_0');
      z.setCollideWorldBounds(true);
      z.speed=30+Math.random()*20;
      z.frameIndex=0;
    }
  }

  movePlayer(x,y){
    this.player.setVelocity(x*150,y*150);
    this.updatePlayerTexture();
  }

  shoot(){
    beep(440,0.05);
    let b=this.bullets.create(this.player.x,this.player.y,'bullet_0');
    b.setCollideWorldBounds(true);
    b.body.onWorldBounds=true;
    const speed=250;
    switch(this.lastDir){
      case 'up': b.setVelocity(0,-speed); break;
      case 'down': b.setVelocity(0,speed); break;
      case 'left': b.setVelocity(-speed,0); break;
      case 'right': b.setVelocity(speed,0); break;
    }
    b.body.world.on('worldbounds',function(body){if(body.gameObject===b)b.destroy();});
  }

  updatePlayerTexture(){
    this.frameTimer+=this.game.loop.delta;
    if(this.frameTimer>200){this.playerFrame=(this.playerFrame+1)%2; this.frameTimer=0;}
    this.player.setTexture('player_'+this.lastDir+'_'+this.playerFrame);
  }

  update(){
    let vx=0,vy=0;
    if(this.cursors.left.isDown||this.wasd.a.isDown){vx=-150; this.lastDir='left';}
    if(this.cursors.right.isDown||this.wasd.d.isDown){vx=150; this.lastDir='right';}
    if(this.cursors.up.isDown||this.wasd.w.isDown){vy=-150; this.lastDir='up';}
    if(this.cursors.down.isDown||this.wasd.s.isDown){vy=150; this.lastDir='down';}
    this.player.setVelocity(vx,vy);
    if(Phaser.Input.Keyboard.JustDown(this.cursors.space)) this.shoot();
    this.updatePlayerTexture();

    // Animate Grit
    this.gritFrame=(this.gritFrame+1)%2;
    this.grit.setTexture('grit_'+this.gritFrame);

    // Zombie AI + animation
    this.zombies.children.iterate(z=>{
      let dx=this.player.x-z.x;
      let dy=this.player.y-z.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      let spd=dist<80? z.speed*1.3 : z.speed;
      this.physics.moveToObject(z,this.player,spd);
      z.frameIndex=(z.frameIndex+1)%2;
      z.setTexture('zombie_'+z.frameIndex);
    });
  }
}

/* =============================
   GAME OVER SCENE
============================= */
class GameOverScene extends Phaser.Scene{
  constructor(){super("GameOverScene");}
  create(data){
    this.add.rectangle(400,300,800,600,0x220000);
    this.add.text(250,200,"GAME OVER",{fontSize:"64px",fill:"#ff0000"});
    this.add.text(290,300,"Final Score:"+data.score,{fontSize:"28px",fill:"#ffffff"});
    this.add.text(240,380,"Press SPACE / Tap ⚡ to Restart",{fontSize:"28px",fill:"#ffff00"});
    this.input.keyboard.once('keydown-SPACE',()=>this.scene.start("TitleScene"));
    document.getElementById('shoot').addEventListener('touchstart',()=>this.scene.start("TitleScene"),{once:true});
  }
}

/* =============================
   PHASER CONFIG
============================= */
const config={
  type:Phaser.AUTO,
  width:800,
  height:600,
  pixelArt:true,
  physics:{default:'arcade'},
  scene:[TitleScene,GameScene,GameOverScene]
};

new Phaser.Game(config);
</script>
</body>
</html>
