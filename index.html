<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grit Quest</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
<style>
body { margin:0; background:black; }
canvas { display:block; margin:auto; }
</style>
</head>
<body>

<script>

/* =============================
   SIMPLE RETRO SOUND ENGINE
============================= */

let audioCtx;
function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(freq, duration, type="square", volume=0.1){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playMusic(){
  let notes = [220, 262, 330, 392];
  let i = 0;
  setInterval(()=>{
    beep(notes[i%notes.length],0.15,"square",0.05);
    i++;
  },300);
}

/* =============================
   PHASER CONFIG
============================= */

const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  pixelArt: true,
  physics: { default:'arcade' },
  scene: [TitleScene, GameScene]
};

new Phaser.Game(config);

/* =============================
   TITLE SCENE
============================= */

class TitleScene extends Phaser.Scene{
  constructor(){ super("TitleScene"); }

  create(){
    this.add.rectangle(400,300,800,600,0x000022);

    this.add.text(220,200,"GRIT QUEST",{
      fontSize:"64px",
      fill:"#ffffff"
    });

    this.add.text(250,300,"Press SPACE to Start",{
      fontSize:"28px",
      fill:"#ffff00"
    });

    this.input.keyboard.once('keydown-SPACE',()=>{
      initAudio();
      playMusic();
      this.scene.start("GameScene");
    });
  }
}

/* =============================
   GAME SCENE
============================= */

class GameScene extends Phaser.Scene{
  constructor(){ super("GameScene"); }

  create(){

    this.add.rectangle(400,300,800,600,0x2d8f2d);

    this.score = 0;
    this.health = 3;

    this.scoreText = this.add.text(20,20,"Score: 0",{fontSize:"20px",fill:"#fff"});
    this.healthText = this.add.text(20,50,"Health: 3",{fontSize:"20px",fill:"#ff4444"});

    this.player = this.physics.add.sprite(400,300,null);
    this.player.setSize(16,16);
    this.player.setTint(0x3399ff);
    this.player.displayWidth = 32;
    this.player.displayHeight = 32;

    this.zombie = this.physics.add.sprite(200,200,null);
    this.zombie.setTint(0x88ff88);
    this.zombie.displayWidth = 32;
    this.zombie.displayHeight = 32;

    this.grit = this.physics.add.sprite(600,400,null);
    this.grit.setTint(0xffcc00);
    this.grit.displayWidth = 20;
    this.grit.displayHeight = 20;

    this.cursors = this.input.keyboard.createCursorKeys();

    this.physics.add.overlap(this.player,this.grit,()=>{
      beep(880,0.1);
      this.score += 10;
      this.scoreText.setText("Score: " + this.score);
      this.grit.x = Phaser.Math.Between(50,750);
      this.grit.y = Phaser.Math.Between(100,550);
    });

    this.physics.add.overlap(this.player,this.zombie,()=>{
      beep(110,0.2,"sawtooth",0.15);
      this.health--;
      this.healthText.setText("Health: " + this.health);
      this.player.x = 400;
      this.player.y = 300;
      if(this.health <= 0){
        this.scene.start("GameOverScene");
      }
    });
  }

  update(){

    this.player.setVelocity(0);

    if(this.cursors.left.isDown) this.player.setVelocityX(-150);
    if(this.cursors.right.isDown) this.player.setVelocityX(150);
    if(this.cursors.up.isDown) this.player.setVelocityY(-150);
    if(this.cursors.down.isDown) this.player.setVelocityY(150);

    // Zombie chase AI
    this.physics.moveToObject(this.zombie,this.player,60);

    if(Phaser.Input.Keyboard.JustDown(this.cursors.space)){
      beep(440,0.1,"square",0.2);
    }
  }
}

/* =============================
   GAME OVER SCENE
============================= */

class GameOverScene extends Phaser.Scene{
  constructor(){ super("GameOverScene"); }

  create(){
    this.add.rectangle(400,300,800,600,0x220000);

    this.add.text(250,250,"GAME OVER",{
      fontSize:"64px",
      fill:"#ff0000"
    });

    this.add.text(250,350,"Press SPACE to Restart",{
      fontSize:"28px",
      fill:"#ffffff"
    });

    this.input.keyboard.once('keydown-SPACE',()=>{
      this.scene.start("TitleScene");
    });
  }
}

config.scene.push(GameOverScene);

</script>
</body>
</html>
