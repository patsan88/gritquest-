<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>GRITQUEST Test Load</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<body>
  <script>
    console.log("Page loaded");  // Should show up in browser console
    let config = {
      type: Phaser.AUTO,
      width: 480, height: 270,
      scene: {
        preload: function() {},
        create: function() {
          this.add.text(10, 10, "Game Loaded!", { fill: "#ffffff" });
        },
        update: function() {}
      }
    };
    new Phaser.Game(config);
  </script>
</body>
</html>
