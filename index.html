<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GRITQUEST: Escape from Detention</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
<style>
body { margin:0; background:black; }
canvas { display:block; margin:auto; touch-action:none; }
button { position:absolute; top:10px; left:10px; z-index:10; }
</style>
</head>
<body>

<script>
// ---- BASE64 PIXEL ART ----
const ASSETS = {
    player:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAQAAAC1+jfqAAAAV0lEQVQoz2NgGAWjYBSMglEwCkYmJiY4gBlYGRkZGBkYGBoYGJiYGBgYGBgYGBkYGRgYGBgYGBgYGRgYGBgYGBkYGBgYGBgYGBkYGBoYGAB8iR6WqlpwmwAAAABJRU5ErkJggg==",
    zombie:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAQAAAC1+jfqAAAAVUlEQVQoz2NgGAWjYBSMglEwCkYmJiY4gBlYGRkZGBkYGBoYGJiYGBgYGBgYGBkYGRgYGBgYGBgYGRgYGBgYGBkYGBgYGBgYGBkYGBoYGAB+qiKi/25ITwAAAABJRU5ErkJggg==",
    grit:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAK0lEQVQYV2NkYGBg+M+ABjBo5+Jm4GxhYEIGBgaGhjY2hgYmBlYGBoYmBgaAEAACZcC4pmxCJ0AAAAASUVORK5CYII="
};

// ---- GLOBAL STATS ----
let playerStats = { grit:0, level:1, health:5 };
let detentionEnd=0;

// ---- OVERWORLD SCENE ----
class OverworldScene extends Phaser.Scene {
    constructor(){ super("OverworldScene"); }
    preload(){
        this.load.image("patsan",ASSETS.player);
        this.load.image("zombie",ASSETS.zombie);
        this.load.image("grit",ASSETS.grit);
    }
    create(){
        // Background
        this.add.rectangle(240,135,480,270,0x87ceeb); // light blue

        // Player
        this.player=this.physics.add.sprite(240,135,"patsan").setCollideWorldBounds(true);
        this.player.setScale(4);

        // Groups
        this.zombies=this.physics.add.group();
        this.grits=this.physics.add.group();
        for(let i=0;i<3;i++) this.spawnZombie();

        this.zombies.getChildren().forEach(z=>z.setScale(4));

        // UI
        this.gritText=this.add.text(10,10,"Grit: "+playerStats.grit,{fontSize:"12px",fill:"#000"});
        this.levelText=this.add.text(10,25,"Level: "+playerStats.level,{fontSize:"12px",fill:"#000"});
        this.healthText=this.add.text(10,40,"Health: "+playerStats.health,{fontSize:"12px",fill:"#000"});
        this.zombieText=this.add.text(10,55,"Zombie Meter: 0",{fontSize:"12px",fill:"#000"});

        // Controls
        this.attackCooldown=false;
        this.moveTarget=null;
        this.zombieMeter=0;

        this.input.on('pointerdown',pointer=>{
            this.moveTarget={x:pointer.x,y:pointer.y};
            if(!this.attackCooldown) this.attack();
        });

        // Button to go to Woods
        let btn = document.createElement("button");
        btn.innerText = "Go to Woods";
        btn.onclick=()=>{ this.scene.start("WoodsScene"); };
        document.body.appendChild(btn);
        this.woodsButton=btn;
    }

    update(){
        if(this.moveTarget){
            const dx=this.moveTarget.x-this.player.x;
            const dy=this.moveTarget.y-this.player.y;
            const dist=Math.sqrt(dx*dx+dy*dy);
            const speed=140;
            if(dist>5){ this.player.setVelocityX((dx/dist)*speed); this.player.setVelocityY((dy/dist)*speed); }
            else{ this.player.setVelocity(0); this.moveTarget=null; }
        } else this.player.setVelocity(0);

        this.zombieMeter+=0.02;
        this.zombieText.setText("Zombie Meter: "+Math.floor(this.zombieMeter));
        if(this.zombieMeter>=100) this.scene.start("DetentionScene");

        this.physics.overlap(this.player,this.grits,(p,g)=>{ g.destroy(); this.collectGrit(); });
        this.physics.overlap(this.player,this.zombies,(p,z)=>{ z.destroy(); this.takeDamage(); });
    }

    spawnZombie(){
        let z=this.zombies.create(Phaser.Math.Between(50,430),Phaser.Math.Between(50,220),"zombie");
        z.setVelocity(Phaser.Math.Between(-50,50),Phaser.Math.Between(-50,50));
        z.setCollideWorldBounds(true); z.setBounce(1);
        z.setScale(4);
    }

    attack(){
        this.attackCooldown=true;
        this.zombies.getChildren().forEach(z=>{
            if(Phaser.Math.Distance.Between(this.player.x,this.player.y,z.x,z.y)<40){ z.destroy(); this.spawnGrit(z.x,z.y); }
        });
        this.time.delayedCall(500,()=>{this.attackCooldown=false;});
    }

    spawnGrit(x,y){ this.grits.create(x,y,"grit").setScale(4); }
    collectGrit(){ 
        playerStats.grit+=10; this.gritText.setText("Grit: "+playerStats.grit);
        if(playerStats.grit>=playerStats.level*50) this.levelUp();
    }
    levelUp(){
        playerStats.level++; playerStats.health+=2;
        this.levelText.setText("Level: "+playerStats.level);
        this.healthText.setText("Health: "+playerStats.health);
        this.player.setTint(0x88ffff);
    }
    takeDamage(){
        playerStats.health--; this.healthText.setText("Health: "+playerStats.health);
        if(playerStats.health<=0) this.scene.start("DetentionScene");
    }

    shutdown(){ // remove button when leaving scene
        if(this.woodsButton){ this.woodsButton.remove(); this.woodsButton=null; }
    }
}

// ---- WOODS SCENE ----
class WoodsScene extends Phaser.Scene{
    constructor(){ super("WoodsScene"); }
    create(){
        this.add.rectangle(240,135,480,270,0x228B22); // green background

        this.player=this.physics.add.sprite(240,135,"patsan").setCollideWorldBounds(true).setScale(4);
        this.grits=this.physics.add.group();
        for(let i=0;i<5;i++) this.grits.create(Phaser.Math.Between(50,430),Phaser.Math.Between(50,220),"grit").setScale(4);

        this.input.on('pointerdown',pointer=>{ this.moveTarget={x:pointer.x,y:pointer.y}; });
        this.moveTarget=null;

        // Button to return to Overworld
        let btn = document.createElement("button");
        btn.innerText = "Return to School";
        btn.onclick=()=>{ this.scene.start("OverworldScene"); };
        document.body.appendChild(btn);
        this.returnButton=btn;

        // UI
        this.gritText=this.add.text(10,10,"Grit: "+playerStats.grit,{fontSize:"12px",fill:"#fff"});
    }
    update(){
        if(this.moveTarget){
            const dx=this.moveTarget.x-this.player.x;
            const dy=this.moveTarget.y-this.player.y;
            const dist=Math.sqrt(dx*dx+dy*dy);
            const speed=140;
            if(dist>5){ this.player.setVelocityX((dx/dist)*speed); this.player.setVelocityY((dy/dist)*speed); }
            else{ this.player.setVelocity(0); this.moveTarget=null; }
        } else this.player.setVelocity(0);

        this.physics.overlap(this.player,this.grits,(p,g)=>{ g.destroy(); playerStats.grit+=10; this.gritText.setText("Grit: "+playerStats.grit); });
    }
    shutdown(){ if(this.returnButton){ this.returnButton.remove(); this.returnButton=null; } }
}

// ---- DETENTION SCENE ----
class DetentionScene extends Phaser.Scene{
    constructor(){ super("DetentionScene"); }
    create(){
        if(!detentionEnd) detentionEnd=Date.now()+180000;
        this.detentionText=this.add.text(100,120,"",{fontSize:"16px",fill:"#000"});
        this.time.addEvent({
            delay:1000, loop:true,
            callback:()=>{
                let remaining=Math.ceil((detentionEnd-Date.now())/1000);
                if(remaining<=0){ detentionEnd=0; this.scene.start("OverworldScene"); }
                else this.detentionText.setText("Detention: "+remaining+"s");
            }
        });
    }
}

// ---- PHASER CONFIG ----
const config = {
    type: Phaser.AUTO,
    width:480,
    height:270,
    pixelArt:true,
    physics:{default:"arcade",arcade:{debug:false}},
    scene:[OverworldScene,WoodsScene,DetentionScene]
};
new Phaser.Game(config);

</script>

</body>
</html>
